<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EmmaStudio</title>
    <!-- Add Futuristic Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL STYLES ===== */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: #e2e8f0;
    /* Deep space/tech gradient background */
    background: linear-gradient(135deg, #050b14 0%, #0a192f 50%, #110b1f 100%);
    overflow-x: hidden;
    min-height: 100vh;
}

h1, h2, h3, h4 {
    font-family: 'Rajdhani', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 0;
}

/* ===== AI NEURAL CANVAS ===== */
#bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -3;
    opacity: 0.6;
}

/* ===== 3D DIGITAL LANDSCAPE (Robotics Theme) ===== */
.cyber-landscape {
    position: fixed;
    bottom: -20%;
    left: -50%;
    width: 200%;
    height: 60vh;
    background-image: 
        linear-gradient(rgba(0, 242, 254, 0.2) 2px, transparent 2px),
        linear-gradient(90deg, rgba(0, 242, 254, 0.2) 2px, transparent 2px);
    background-size: 50px 50px;
    transform: perspective(600px) rotateX(75deg);
    transform-origin: top;
    z-index: -2;
    animation: moveGrid 15s linear infinite;
    box-shadow: inset 0 100px 100px rgba(5, 11, 20, 1); /* Fades grid into the horizon */
}

@keyframes moveGrid {
    0% { transform: perspective(600px) rotateX(75deg) translateY(0); }
    100% { transform: perspective(600px) rotateX(75deg) translateY(50px); }
}

/* ===== NAVBAR HUD ===== */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(10, 25, 47, 0.7);
    /* backlift-filter: blur(16px);*/
    border-bottom: 2px solid rgba(0, 242, 254, 0.3);
    box-shadow: 0 4px 30px rgba(0, 242, 254, 0.1);
    /* Mobile responsiveness */
    flex-wrap: wrap;
    gap: 15px;
}

.brand {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 10px #00f2fe;
    display: flex;
    align-items: center;
    gap: 10px;
}

nav a {
    color: #8892b0;
    text-decoration: none;
    margin-left: 30px;
    font-weight: 600;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    transition: all 0.3s ease;
}

nav a:hover, nav a.active {
    color: #00f2fe;
    text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
}

/* ===== CONTAINER ===== */
.container {
    padding: 40px 30px;
    max-width: 1200px;
    margin: auto;
    position: relative;
    z-index: 10;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #050b14; }
::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 4px; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
    .brand {
        font-size: 18px;
    }
    
    nav {
        padding: 10px 20px;
    }
    
    .container {
        padding: 20px 15px;
    }
    
    .cyber-landscape {
        display: none;
    }
}
</style>
</head>
<body>

    <!-- Background Elements -->
    <canvas id="bgCanvas"></canvas>
    <div class="cyber-landscape"></div>

    <!-- Navigation HUD -->
    <nav>
        <div class="brand">
            <i class="fa-solid fa-microchip"></i> EmmaStudio for freelancing
        </div>
        <div class="right">
            <a href="/"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <!--<a href="/projects"><i class="fa-solid fa-diagram-project"></i> Projects</a> -->
            <a href="/services"><i class="fa-solid fa-user"></i> Emmanuel's Profile</a>
            <a href="/client/order"><i class="fa-solid fa-box"></i> Place orders</a>
            <a href="/client_billing"><i class="fa-solid fa-credit-card"></i> Billing</a>
            <a href="/client_feedback"><i class="fa-solid fa-comment"></i> Feedbacks</a>
            <a href="/logout"><i class="fa-solid fa-sign-out-alt"></i> logout</a>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
